[embedding]
model = "BAAI/bge-small-en-v1.5"
dimensions = 384
batch_size = 8

[reranking]
model = "Qwen/Qwen3-Reranker-0.6B"
batch_size = 4
limit = 6

[retrieval]
vector_search_limit = 20
chat_search_limit = 6
match_threshold = 0.1
max_context_chars = 7000

[chunking]
size = 800
overlap = 100
max_row_batch_documents = 24
rows_per_batch_document = 25
max_columns_per_row_document = 12
