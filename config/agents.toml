[pipeline]
mode = "multi"

[forecasting]
model = "google/timesfm-2.5-200m-pytorch"
max_context = 1024
max_horizon = 256

[agents.data_preparation]
provider = "groq"
model = "openai/gpt-oss-20b"
temperature = 0.1
max_completion_tokens = 800
reasoning_effort = "low"
strict_json_schema = true

